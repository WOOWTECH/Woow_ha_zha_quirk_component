- action:
  - action: tuya_dp_sender.send_dp
    data:
      dp: 2
      dp_type: 2
      ieee: cc:86:ec:ff:fe:a1:ea:33
      value: 50
  alias: Test Position 50
  id: test_position_50
  trigger:
  - event_type: test_position_50
    trigger: event
- action:
  - action: cover.set_cover_position
    data:
      position: 50
    target:
      entity_id: cover.tze200_nogaemzt_ts0601
  alias: Test Cover 50
  id: test_cover_50
  trigger:
  - event_type: test_cover_50
    trigger: event
- actions:
  - action: persistent_notification.create
    data:
      message: hello
      title: test
  alias: Deploy Quirk Auto
  conditions: []
  id: deploy_quirk_auto
  triggers: []
- actions:
  - action: homeassistant.reload_config_entry
    data:
      entry_id: 01KN1AY4CTYABW5D07GJY0WZQ2
  - delay:
      seconds: 30
  - condition: state
    entity_id: fan.tze200_hmgktzj2_ts0601_feng_shan
    state: unavailable
  - action: homeassistant.reload_config_entry
    data:
      entry_id: 01KN1AY4CTYABW5D07GJY0WZQ2
  - delay:
      seconds: 30
  - condition: state
    entity_id: fan.tze200_hmgktzj2_ts0601_feng_shan
    state: unavailable
  - action: system_log.write
    data:
      level: error
      message: ZHA auto-recovery failed after 2 attempts, manual intervention needed
  alias: ZHA Auto Recovery
  conditions: []
  description: Automatically reload ZHA when fan entity becomes unavailable
  id: zha_auto_recovery
  max_exceeded: silent
  mode: single
  triggers:
  - entity_id: fan.tze200_hmgktzj2_ts0601_feng_shan
    for:
      seconds: 60
    to: unavailable
    trigger: state
- actions:
  - delay:
      seconds: 10
  - repeat:
      count: 4
      sequence:
      - variables:
          idx: '{{ repeat.index }}'
          label_attr: '{{ ["screen_label_1", "screen_label_2", "screen_label_3", "screen_label_4"][repeat.index
            - 1] }}'
          switch_id: '{{ ["switch.tze204_wwaeqnrf_ts0601_switch_1", "switch.tze204_wwaeqnrf_ts0601_switch_2",
            "switch.tze204_wwaeqnrf_ts0601_switch_3", "switch.tze204_wwaeqnrf_ts0601_switch_4"][repeat.index
            - 1] }}'
      - action: zha.set_zigbee_cluster_attribute
        data:
          attribute: '{{ label_attr }}'
          cluster_id: 61184
          cluster_type: in
          endpoint_id: 1
          ieee: a4:c1:38:0c:bc:72:be:6d
          value: '{{ state_attr(switch_id, "friendly_name") }}'
  alias: DIY Screen Switch - Sync Screen Labels from Entity Names
  conditions: []
  description: Sync switch friendly_name to device screen labels (DP105-108) on HA
    start and when entity names change
  id: diy_screen_label_sync
  max: 4
  mode: queued
  triggers:
  - event: start
    trigger: homeassistant
  - event_data:
      action: update
    event_type: entity_registry_updated
    id: registry_update
    trigger: event
